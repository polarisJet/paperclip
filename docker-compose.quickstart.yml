services:
  paperclip:
    user: "0:0"  
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PAPERCLIP_PORT:-3100}"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MAX_RETRIES: "${OPENAI_MAX_RETRIES:-}"
      DEFAULT_MODEL: "${DEFAULT_MODEL:-anthropic/claude-3.5-sonnet}"
      FALLBACK_MODEL: "${FALLBACK_MODEL:-openai/gpt-4o-mini}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-public}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-BETTER_AUTH_SECRET must be set}"
      DATABASE_URL: "postgresql://paperclip:${SERVICE_PASSWORD_POSTGRES}@db:5432/paperclip"      
    volumes:
      - "${PAPERCLIP_DATA_DIR:-./data/docker-paperclip}:/paperclip"
      - paperclip_data:/paperclip/instances
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: paperclip
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  paperclip_data:
  pgdata:      
